<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Watchlist</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Watchlist">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<script>
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/Watchlist/sw.js', {scope: '/Watchlist/'});
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream:    #D5C9B5;
  --cream2:   #C5B7A0;
  --cream3:   #B0A088;
  --ink:      #2C1F0E;
  --ink2:     #5C4A32;
  --ink3:     #8C7A62;
  --up:       #1A7A4A;
  --up-bg:    #D0EBD9;
  --dn:       #B83232;
  --dn-bg:    #F0D5D5;
  --warn:     #C07A10;
  --warn-bg:  #F5E5C8;
  --info:     #1A5FA8;
  --info-bg:  #D0DFF5;
  --card:     #E0D5C5;
  --border:   rgba(92,74,50,0.22);
  --shadow:   0 2px 12px rgba(44,31,14,0.14);
  --radius:   14px;
  --font:     'DM Sans', sans-serif;
  --mono:     'DM Mono', monospace;
}

[data-theme="dark"] {
  --cream:  #1C1814;
  --cream2: #252018;
  --cream3: #2E2820;
  --ink:    #F0E8DC;
  --ink2:   #C4AE92;
  --ink3:   #8A7860;
  --up:     #2EA862;
  --up-bg:  #0D2B1A;
  --dn:     #D04040;
  --dn-bg:  #2B0D0D;
  --warn:   #D08820;
  --warn-bg:#2B1E08;
  --info:   #4080CC;
  --info-bg:#0D1D33;
  --card:   #221E19;
  --border: rgba(200,175,140,0.1);
  --shadow: 0 2px 12px rgba(0,0,0,0.45);
}
[data-theme="dark"] .topbar {
  background: rgba(28,24,20,0.94);
}
[data-theme="dark"] .search-inp,
[data-theme="dark"] .field-inp {
  background: var(--card);
  color: var(--ink);
}
[data-theme="dark"] .sheet {
  background: #201C17;
}

.theme-btn {
  width: 32px;
  height: 32px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 50%;
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
}
.theme-btn:hover { background: var(--cream2); }

* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: var(--font);
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── TOPBAR ── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(213,201,181,0.94);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.topbar-logo {
  width: 34px;
  height: 34px;
  background: var(--ink);
  color: var(--cream);
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.topbar-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.3px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.refresh-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  background: var(--ink);
  color: var(--cream);
  border: none;
  border-radius: 20px;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.refresh-btn:disabled { opacity: 0.55; }
.refresh-btn:not(:disabled):hover { opacity: 0.8; }

.last-update {
  font-size: 11px;
  color: var(--ink3);
  font-family: var(--mono);
}

/* ── STATS BAR ── */
.stats-bar {
  display: flex;
  gap: 10px;
  padding: 14px 20px 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.stats-bar::-webkit-scrollbar { display: none; }

.stat-chip {
  flex-shrink: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.stat-chip-lbl { font-size: 10px; color: var(--ink3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
.stat-chip-val { font-size: 15px; font-weight: 700; font-family: var(--mono); color: var(--ink); }

/* ── SEARCH + FILTER ── */
.controls {
  padding: 14px 20px;
  display: flex;
  gap: 10px;
  align-items: center;
}

.search-wrap {
  flex: 1;
  position: relative;
}
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink3);
  font-size: 14px;
  pointer-events: none;
}
.search-inp {
  width: 100%;
  padding: 10px 14px 10px 36px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-family: var(--font);
  font-size: 14px;
  color: var(--ink);
  outline: none;
}
.search-inp::placeholder { color: var(--ink3); }
.search-inp:focus { border-color: var(--ink2); }

.filter-pills {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.fpill {
  padding: 8px 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink2);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.fpill.active {
  background: var(--ink);
  color: var(--cream);
  border-color: var(--ink);
}

/* ── TABLE ── */
.table-wrap {
  padding: 0 20px 100px;
}

.tbl-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 7px;
}

.tbl-table thead th {
  font-size: 10px;
  font-weight: 700;
  color: var(--ink3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 4px 10px;
  white-space: nowrap;
}
.tbl-table thead th:first-child { padding-left: 4px; }
.tbl-table thead th:last-child  { padding-right: 4px; }

.tbl-table tbody tr {
  background: var(--card);
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: all 0.15s;
  animation: fadeIn 0.2s ease both;
}
.tbl-table tbody tr:hover td { background: #CEC0AA; }
.tbl-table tbody tr:hover { transform: translateY(-1px); }
.tbl-table tbody tr.row-active td { background: rgba(26,122,74,0.13); }
.tbl-table tbody tr.row-active:hover td { background: rgba(26,122,74,0.20); }

.row-toggle {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
  transition: border-color 0.15s, background 0.15s;
  padding: 0;
}
.row-toggle::after {
  content: '';
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  background: transparent;
  transition: background 0.15s;
}
.row-toggle.active {
  border-color: var(--up);
}
.row-toggle.active::after {
  background: var(--up);
}
.row-toggle:hover {
  border-color: var(--up);
  opacity: 0.8;
}

.tbl-table tbody td {
  padding: 11px 10px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.tbl-table tbody td:first-child {
  border-left: 1px solid var(--border);
  border-radius: 12px 0 0 12px;
  padding-left: 14px;
}
.tbl-table tbody td:last-child {
  border-right: 1px solid var(--border);
  border-radius: 0 12px 12px 0;
  padding-right: 14px;
}

@keyframes fadeIn {
  from { opacity:0; transform: translateY(4px); }
  to   { opacity:1; transform: translateY(0); }
}

.cell-ticker { display: flex; flex-direction: column; gap: 2px; }
.ticker-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.2px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.ticker-exp {
  font-size: 11px;
  color: var(--ink3);
  font-family: var(--mono);
}

.cell-price {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  text-align: right;
  display: flex;
  justify-content: flex-end;
  align-items: center;
}
.price-loading {
  display: inline-block;
  width: 36px;
  height: 12px;
  background: var(--cream3);
  border-radius: 4px;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

.cell-opinion, .cell-ws {
  display: flex;
  justify-content: flex-end;
  align-items: center;
}

.badge {
  padding: 3px 9px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.2px;
  white-space: nowrap;
}
.badge-strong-buy  { background: var(--up-bg);   color: var(--up);   }
.badge-buy         { background: #EAF3FF;         color: var(--info); }
.badge-hold        { background: var(--cream2);   color: var(--ink2); }
.badge-strong-sell { background: var(--dn-bg);    color: var(--dn);   }
.badge-sell        { background: #FCEEE8;         color: #B05020;     }
.badge-empty       { background: transparent;     color: var(--ink3); font-size:10px; }

.note-row {
  display: none;
  grid-column: 1 / -1;
  padding: 8px 0 2px;
  font-size: 12px;
  color: var(--warn);
  border-top: 1px solid var(--border);
  margin-top: 8px;
}
.note-row.visible { display: block; }

/* ── SORT HEADER ── */
.sort-col {
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  display: flex;
  align-items: center;
  gap: 3px;
  justify-content: flex-end;
}
.sort-col.active { color: var(--ink); }
.sort-arrow { font-size: 9px; opacity: 0.5; }
.sort-col.active .sort-arrow { opacity: 1; }

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink3);
}
.empty-icon { font-size: 36px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: 24px;
  right: 20px;
  width: 52px;
  height: 52px;
  background: var(--ink);
  color: var(--cream);
  border: none;
  border-radius: 50%;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(44,31,14,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  transition: transform 0.15s;
}
.fab:hover { transform: scale(1.08); }

/* ── MODAL ── */
.overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(44,31,14,0.5);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.sheet {
  width: 100%;
  max-width: 520px;
  background: var(--card);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--border);
  padding: 20px 20px 40px;
  max-height: 88vh;
  overflow-y: auto;
}
.sheet-handle {
  width: 36px; height: 4px;
  background: var(--cream3);
  border-radius: 2px;
  margin: 0 auto 20px;
}
.sheet-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 20px;
  letter-spacing: -0.3px;
}
.field-group { margin-bottom: 14px; }
.field-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.field-inp {
  width: 100%;
  padding: 11px 13px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: var(--font);
  font-size: 14px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s;
}
.field-inp:focus { border-color: var(--ink2); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-primary {
  width: 100%;
  padding: 14px;
  background: var(--ink);
  color: var(--cream);
  border: none;
  border-radius: 12px;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.85; }
.btn-ghost {
  width: 100%;
  padding: 12px;
  background: transparent;
  color: var(--ink3);
  border: none;
  font-family: var(--font);
  font-size: 14px;
  cursor: pointer;
  margin-top: 6px;
}
.btn-danger {
  width: 100%;
  padding: 12px;
  background: var(--dn-bg);
  color: var(--dn);
  border: 1px solid rgba(184,50,50,0.2);
  border-radius: 10px;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 6px;
}

select.field-inp { -webkit-appearance: none; }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">WL</div>
    <span class="topbar-title">Watchlist</span>
  </div>
  <div class="topbar-right">
    <span class="last-update" id="lastUpdate"></span>
    <button onclick="exportData()" style="padding:7px 12px;background:rgba(92,74,50,0.1);border:1px solid var(--border);border-radius:20px;font-family:var(--font);font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;">📤 Export</button>
    <button onclick="importData()" style="padding:7px 12px;background:rgba(92,74,50,0.1);border:1px solid var(--border);border-radius:20px;font-family:var(--font);font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;">📥 Import</button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Tema değiştir">🌙</button>
    <button class="refresh-btn" id="refreshBtn" onclick="fetchPrices()">
      <span>📡</span> Fiyat Güncelle
    </button>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-inp" id="searchInp" placeholder="Ticker veya not ara..." oninput="renderTable()">
  </div>
  <div class="filter-pills">
    <div class="fpill active" data-f="all" onclick="setFilter(this)">Tümü</div>
    <div class="fpill" data-f="STRONG BUY" onclick="setFilter(this)">S.BUY</div>
    <div class="fpill" data-f="BUY" onclick="setFilter(this)">BUY</div>
    <div class="fpill" data-f="HOLD" onclick="setFilter(this)">HOLD</div>
    <div class="fpill" data-f="SELL" onclick="setFilter(this)">SELL+</div>
  </div>
</div>

<div class="table-wrap">
  <table class="tbl-table">
    <thead>
      <tr>
        <th style="text-align:left">Ticker</th>
        <th style="text-align:right;cursor:pointer;user-select:none" onclick="cycleSort('price')">Fiyat <span id="sort-price">↕</span></th>
        <th style="text-align:right">Quant</th>
        <th style="text-align:right">Wall St.</th>
        <th style="text-align:right;cursor:pointer;user-select:none" onclick="cycleSort('er')">ER <span id="sort-er">↕</span></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<button class="fab" onclick="openAdd()">+</button>

// ── HELPERS ──
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function erDaysLeft(er) {
  if(!er) return null;
  var months = {JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};
  var parts = er.trim().toUpperCase().split(' ');
  if(parts.length < 2) return null;
  var day = parseInt(parts[0]);
  var mon = months[parts[1]];
  if(isNaN(day) || mon === undefined) return null;
  var now = new Date(); now.setHours(0,0,0,0);
  var d = new Date(now.getFullYear(), mon, day);
  if(d < now) d = new Date(now.getFullYear()+1, mon, day);
  return Math.round((d - now) / (1000*60*60*24));
}

// ── BADGES ──
function badgeHtml(val) {
  if(!val || val === '-') return '<span class="badge badge-empty">—</span>';
  var v = val.trim().toUpperCase();
  if(v === 'STRONG BUY')  return '<span class="badge badge-strong-buy">S.BUY</span>';
  if(v === 'BUY')         return '<span class="badge badge-buy">BUY</span>';
  if(v === 'HOLD')        return '<span class="badge badge-hold">Hold</span>';
  if(v === 'STRONG SELL') return '<span class="badge badge-strong-sell">S.SELL</span>';
  if(v === 'SELL')        return '<span class="badge badge-sell">Sell</span>';
  return '<span class="badge badge-hold">'+val+'</span>';
}

// ── FILTER ──
function setFilter(el) {
  document.querySelectorAll('.fpill').forEach(function(p){ p.classList.remove('active'); });
  el.classList.add('active');
  activeFilter = el.dataset.f;
  renderTable();
}

function passesFilter(row) {
  if(activeFilter === 'all') return true;
  var v = (row.quant||'').trim().toUpperCase();
  var f = activeFilter.toUpperCase();
  if(f === 'BUY')  return v === 'BUY' || v === 'STRONG BUY';
  if(f === 'SELL') return v === 'SELL' || v === 'STRONG SELL';
  return v === f;
}

// ── SORT ──
function cycleSort(col) {
  if(sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  // İkonları güncelle
  ['price','er'].forEach(function(c){
    var el = document.getElementById('sort-'+c);
    if(!el) return;
    if(sortCol === c) el.textContent = sortDir === 1 ? '↑' : '↓';
    else el.textContent = '↕';
  });
  renderTable();
}

// ── RENDER TABLE ──
function renderTable() {
  var q = document.getElementById('searchInp').value.trim().toLowerCase();
  var rows = data.filter(function(r) {
    if(!passesFilter(r)) return false;
    if(!q) return true;
    return r.ticker.toLowerCase().includes(q) ||
           (r.note||'').toLowerCase().includes(q) ||
           (r.er||'').toLowerCase().includes(q);
  });

  if(sortCol === 'price') {
    rows.sort(function(a,b){
      var pa = prices[a.ticker]||a.price_ref||0;
      var pb = prices[b.ticker]||b.price_ref||0;
      return (pa-pb)*sortDir;
    });
  } else if(sortCol === 'er') {
    // "14 MAY", "02 JUN" gibi tarihleri karşılaştır
    var months = {JAN:1,FEB:2,MAR:3,APR:4,MAY:5,JUN:6,JUL:7,AUG:8,SEP:9,OCT:10,NOV:11,DEC:12};
    function erToNum(er) {
      if(!er) return 9999;
      var parts = er.trim().toUpperCase().split(' ');
      if(parts.length < 2) return 9999;
      var day = parseInt(parts[0]) || 0;
      var mon = months[parts[1]] || 0;
      return mon * 100 + day;
    }
    rows.sort(function(a,b){
      return (erToNum(a.er) - erToNum(b.er)) * sortDir;
    });
  }

  renderStats();

  var body = document.getElementById('tableBody');
  if(!rows.length) {
    body.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--ink3);border:none"><div style="font-size:28px;margin-bottom:8px">🔍</div>Sonuç bulunamadı</td></tr>';
    return;
  }

  body.innerHTML = rows.map(function(r, idx) {
    var sp = prices[r.ticker];
    var priceHtml = sp > 0
      ? '<span style="font-family:var(--mono);font-size:14px;font-weight:500;">$' + sp.toFixed(2) + '</span>'
      : '<span class="price-loading"></span>';

    var isOn = !!activeRows[r.id];
    var toggleBtn = '<button class="row-toggle'+(isOn?' active':'')+'" onclick="toggleActive('+r.id+',event)" title="İşlem müsait"></button>';

    var erCell = (function(){
      var dLeft = erDaysLeft(r.er);
      var base  = esc(r.er||'—');
      var st    = 'text-align:right;font-size:11px;font-family:var(--mono);color:var(--ink2);white-space:nowrap;';
      var txt   = base;
      if(dLeft !== null){
        if(dLeft === 0){
          st  = 'text-align:right;font-size:11px;font-family:var(--mono);color:var(--dn);font-weight:700;white-space:nowrap;';
          txt = base + ' ⚡';
        } else if(dLeft <= 7){
          st  = 'text-align:right;font-size:11px;font-family:var(--mono);color:var(--dn);font-weight:700;white-space:nowrap;';
          txt = base + ' <span style="font-size:9px">('+dLeft+'g)</span>';
        } else if(dLeft <= 14){
          st  = 'text-align:right;font-size:11px;font-family:var(--mono);color:var(--warn);font-weight:600;white-space:nowrap;';
          txt = base + ' <span style="font-size:9px">('+dLeft+'g)</span>';
        } else {
          txt = base + ' <span style="font-size:9px;opacity:0.55">('+dLeft+'g)</span>';
        }
      }
      return '<td style="'+st+'">'+txt+'</td>';
    })();

    return '<tr style="animation-delay:'+Math.min(idx*0.03,0.3)+'s"'+(isOn?' class="row-active"':'')+' onclick="openEdit('+r.id+')">' +
      '<td>' +
        '<div style="display:flex;align-items:center;gap:10px">' +
          toggleBtn +
          '<div class="cell-ticker">' +
            '<div class="ticker-name"><strong>'+esc(r.ticker)+'</strong></div>' +
            (r.note?'<div style="font-size:10px;color:var(--ink3);margin-top:1px;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(r.note)+'</div>':'') +
          '</div>' +
        '</div>' +
      '</td>' +
      '<td style="text-align:right">'+priceHtml+'</td>' +
      '<td style="text-align:right">'+badgeHtml(r.quant)+'</td>' +
      '<td style="text-align:right">'+badgeHtml(r.ws)+'</td>' +
      erCell +
    '</tr>';
  }).join('');
}

// ── PRICE FETCH ──
function _parseQuotes(res) {
  console.log('[WL] API yanıt:', JSON.stringify(res).slice(0,400));
  var list = [];
  if(!res) { console.warn('[WL] Boş yanıt'); return 0; }
  if(Array.isArray(res)) list = res;
  else if(res.quotes && Array.isArray(res.quotes)) list = res.quotes;
  else if(res.symbol) list = [res];
  else if(typeof res === 'object') {
    Object.keys(res).forEach(function(k){
      var v = res[k];
      if(v && typeof v === 'object' && (v.price || v.regularMarketPrice)) {
        list.push({symbol:k, price: v.price || v.regularMarketPrice});
      } else if(v && typeof v === 'number' && v > 0) {
        list.push({symbol:k, price: v});
      }
    });
  }
  var updated = 0;
  list.forEach(function(q){
    if(!q) return;
    var sym = (q.symbol || q.ticker || '').toUpperCase();
    var p = q.price || q.regularMarketPrice || q.close || 0;
    if(sym && p > 0){ prices[sym] = Math.round(p*100)/100; updated++; }
  });
  return updated;
}

function _fetchBatch(batch) {
  var url = PROXY_BASE + '/api/quote?symbol=' + batch.map(encodeURIComponent).join(',');
  return fetch(url)
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(res){ return _parseQuotes(res); })
    .catch(function(err){
      // Batch başarısız → tek tek dene
      console.warn('Batch failed, going sequential:', err.message);
      var chain = Promise.resolve(0);
      batch.forEach(function(t){
        chain = chain.then(function(acc){
          return fetch(PROXY_BASE+'/api/quote?symbol='+encodeURIComponent(t))
            .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
            .then(function(q){
              var p = q.price || q.regularMarketPrice || 0;
              if(p>0){ prices[t.toUpperCase()] = Math.round(p*100)/100; return acc+1; }
              return acc;
            }).catch(function(){ return acc; });
        });
      });
      return chain;
    });
}

function fetchPrices() {
  if(_fetching) return;
  var unique = data.map(function(r){ return r.ticker; })
    .filter(function(t,i,a){ return a.indexOf(t)===i; });
  if(!unique.length) return;

  var btn = document.getElementById('refreshBtn');
  btn.innerHTML = '<span>⟳</span> Güncelleniyor...';
  btn.disabled = true;
  _fetching = true;

  // 10'ar 10'ar batch'le — 57 ticker için ~6 istek
  var BATCH = 10;
  var batches = [];
  for(var i=0; i<unique.length; i+=BATCH){
    batches.push(unique.slice(i, i+BATCH));
  }

  var totalUpdated = 0;
  var chain = Promise.resolve();
  batches.forEach(function(batch, bi){
    chain = chain.then(function(){
      btn.innerHTML = '<span>⟳</span> ' + Math.round((bi/batches.length)*100) + '%...';
      return _fetchBatch(batch).then(function(n){ totalUpdated += n; });
    });
  });

  chain.then(function(){
    _fetching = false;
    try{ localStorage.setItem(LS_PRICES, JSON.stringify(prices)); }catch(e){}
    var now = new Date();
    document.getElementById('lastUpdate').textContent =
      now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    btn.innerHTML = '✓ '+totalUpdated+'/'+unique.length+' güncellendi';
    btn.style.background = totalUpdated===0?'var(--dn)':totalUpdated<unique.length?'#C07A10':'var(--up)';
    setTimeout(function(){
      btn.innerHTML = '<span>📡</span> Fiyat Güncelle';
      btn.style.background = '';
      btn.disabled = false;
    }, 5000);
    renderTable();
  }).catch(function(err){
    _fetching = false;
    btn.innerHTML = '✗ Hata';
    btn.style.background = 'var(--dn)';
    btn.disabled = false;
    console.error(err);
  });
}

  if(editingId) {
    var idx = data.findIndex(function(r){ return r.id===editingId; });
    if(idx>=0){ data[idx].ticker=ticker; data[idx].er=er; data[idx].quant=quant; data[idx].ws=ws; data[idx].note=note; }
  } else {
    var _ids = data.map(function(r){return r.id;}); var newId = _ids.length ? Math.max.apply(null, _ids) + 1 : 1;
    data.push({id:newId, ticker:ticker, er:er, price_ref:0, quant:quant, ws:ws, note:note});
  }
  save();
  document.querySelector('.overlay').remove();
  renderTable();
}

function deleteRow(id) {
  var m2 = document.createElement('div');
  m2.className = 'overlay';
  m2.innerHTML = '<div class="sheet" style="text-align:center">' +
    '<div class="sheet-handle"></div>' +
    '<div style="font-size:28px;margin-bottom:10px">🗑</div>' +
    '<div class="sheet-title" style="text-align:center">Silmek istediğine emin misin?</div>' +
    '<div style="display:flex;gap:10px;margin-top:10px">' +
      '<button class="btn-ghost" style="flex:1;border:1px solid var(--border);border-radius:10px" onclick="this.closest(\'.overlay\').remove()">İptal</button>' +
      '<button style="flex:1;padding:12px;background:var(--dn-bg);color:var(--dn);border:1px solid rgba(184,50,50,.2);border-radius:10px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer" onclick="confirmDelete('+id+')">Sil</button>' +
    '</div>' +
  '</div>';
  document.querySelectorAll('.overlay').forEach(function(o){ o.remove(); });
  document.body.appendChild(m2);
  m2.addEventListener('click', function(e){ if(e.target===m2) m2.remove(); });
}

function confirmDelete(id) {
  data = data.filter(function(r){ return r.id!==id; });
  save();
  document.querySelectorAll('.overlay').forEach(function(o){ o.remove(); });
  renderTable();
}

// ── DARK MODE ──
var _dark = localStorage.getItem('wl_dark') === '1';
function applyTheme() {
  document.documentElement.setAttribute('data-theme', _dark ? 'dark' : 'light');
  var btn = document.getElementById('themeBtn');
  if(btn) btn.textContent = _dark ? '☀️' : '🌙';
}
function toggleTheme() {
  _dark = !_dark;
  localStorage.setItem('wl_dark', _dark ? '1' : '0');
  applyTheme();
}

// ── INIT ──
applyTheme();
renderTable();
</script>
